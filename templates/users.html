{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Mitarbeiter</h2>

  <div style="margin: 12px 0;">
    <a href="{{ url_for('users_add') }}">+ Neuer Mitarbeiter</a>
  </div>

  {% if users %}
    <table style="width:100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.15);">ID</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.15);">Name</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.15);">Rolle</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.15);">Erstellt</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08);">{{ u.id }}</td>
          <td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08);">{{ u.name }}</td>
          <td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08);">{{ u.role }}</td>
          <td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08);">{{ u.created_at }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>Keine Mitarbeiter gefunden.</p>
  {% endif %}
</div>

{% endblock %}
